name: Preprocessing Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing pipeline
        run: python preprocessing/automate_Calvin-Joy-Tarigan.py

      - name: Commit and push preprocessed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update preprocessed data"
          file_pattern: preprocessing/creditcard_preprocessing/
          commit_user_name: "CI Bot"
          commit_user_email: "actions@github.com"
